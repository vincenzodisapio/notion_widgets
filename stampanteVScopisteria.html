<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stampante vs Copisteria</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    padding: 40px;
}

.container{
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    width: 750px;
}

h1{
    text-align: center;
    margin-bottom: 30px;
}

.param{
    margin-bottom: 20px;
}

label{
    font-weight: bold;
}

input[type="number"]{
    width: 100px;
    margin-left: 10px;
}

input[type="range"]{
    width: 100%;
}

.result{
    margin-top: 30px;
    padding: 20px;
    border-radius: 10px;
    background: #eef2ff;
}

.highlight{
    font-weight: bold;
    font-size: 18px;
}

canvas{
    margin-top: 40px;
}
</style>
</head>

<body>

<div class="container">
<h1>Stampante vs Copisteria</h1>

<div class="param">
<label>Costo carta (€/foglio):</label>
<input type="number" id="carta" step="0.001" value="0.02">
<input type="range" min="0" max="0.1" step="0.001" value="0.02" oninput="sync(this,'carta')">
</div>

<div class="param">
<label>Costo cartucce (€):</label>
<input type="number" id="cartucce" step="1" value="30">
<input type="range" min="0" max="200" step="1" value="30" oninput="sync(this,'cartucce')">
</div>

<div class="param">
<label>Durata cartucce (copie):</label>
<input type="number" id="durata" step="1" value="500">
<input type="range" min="1" max="5000" step="1" value="500" oninput="sync(this,'durata')">
</div>

<div class="param">
<label>Costo stampante (€):</label>
<input type="number" id="stampante" step="1" value="100">
<input type="range" min="0" max="1000" step="10" value="100" oninput="sync(this,'stampante')">
</div>

<div class="param">
<label>Costo copia in copisteria (€):</label>
<input type="number" id="copisteria" step="0.01" value="0.10">
<input type="range" min="0" max="1" step="0.01" value="0.10" oninput="sync(this,'copisteria')">
</div>

<div class="param">
<label>Numero copie previste:</label>
<input type="number" id="copie" step="1" value="1000">
<input type="range" min="1" max="10000" step="10" value="1000" oninput="sync(this,'copie')">
</div>

<div class="result" id="risultato"></div>

<canvas id="grafico"></canvas>

</div>

<script>

let chart;

function sync(slider, id){
    document.getElementById(id).value = slider.value;
    calcola();
}

document.querySelectorAll("input[type='number']").forEach(input => {
    input.addEventListener("input", () => {
        const slider = input.parentElement.querySelector("input[type='range']");
        slider.value = input.value;
        calcola();
    });
});

function calcola(){

    const costoCarta = parseFloat(document.getElementById("carta").value);
    const costoCartucce = parseFloat(document.getElementById("cartucce").value);
    const durata = parseFloat(document.getElementById("durata").value);
    const costoStampante = parseFloat(document.getElementById("stampante").value);
    const costoCopisteria = parseFloat(document.getElementById("copisteria").value);
    const copie = parseFloat(document.getElementById("copie").value);

    const costoInchiostroPerCopia = costoCartucce / durata;
    const costoPerCopiaStampante = costoCarta + costoInchiostroPerCopia;

    const costoTotStampante = (costoPerCopiaStampante * copie) + costoStampante;
    const costoTotCopisteria = costoCopisteria * copie;

    // Break-even
    let breakEven = null;

    if(costoCopisteria > costoPerCopiaStampante){
        breakEven = costoStampante / (costoCopisteria - costoPerCopiaStampante);
    }

    let testoBreak;

    if(breakEven && breakEven > 0){
        testoBreak = `Punto di pareggio: ${Math.ceil(breakEven)} copie`;
    } else {
        testoBreak = "Non esiste un punto di pareggio (la copisteria resta sempre più economica).";
    }

    let convenienza;

    if(costoTotStampante < costoTotCopisteria){
        convenienza = "Conviene COMPRARE la stampante 🎉";
    } else if(costoTotStampante > costoTotCopisteria){
        convenienza = "Conviene andare in COPISTERIA 📄";
    } else {
        convenienza = "I costi sono equivalenti.";
    }

    document.getElementById("risultato").innerHTML = `
        <p>Costo totale con stampante: <b>€ ${costoTotStampante.toFixed(2)}</b></p>
        <p>Costo totale in copisteria: <b>€ ${costoTotCopisteria.toFixed(2)}</b></p>
        <p><b>${testoBreak}</b></p>
        <p class="highlight">${convenienza}</p>
    `;

    aggiornaGrafico(costoPerCopiaStampante, costoCopisteria, costoStampante, copie);
}

function aggiornaGrafico(costoPerCopiaStampante, costoCopisteria, costoStampante, maxCopie){

    const labels = [];
    const dataStampante = [];
    const dataCopisteria = [];

    for(let i=0; i<=maxCopie; i+=Math.ceil(maxCopie/20)){
        labels.push(i);
        dataStampante.push((costoPerCopiaStampante*i)+costoStampante);
        dataCopisteria.push(costoCopisteria*i);
    }

    if(chart) chart.destroy();

    const ctx = document.getElementById('grafico').getContext('2d');

    chart = new Chart(ctx,{
        type:'line',
        data:{
            labels:labels,
            datasets:[
                {
                    label:'Costo Stampante',
                    data:dataStampante,
                    borderWidth:3,
                    fill:false
                },
                {
                    label:'Costo Copisteria',
                    data:dataCopisteria,
                    borderWidth:3,
                    fill:false
                }
            ]
        },
        options:{
            responsive:true,
            plugins:{
                legend:{ position:'top' }
            },
            scales:{
                x:{ title:{ display:true, text:'Numero copie' }},
                y:{ title:{ display:true, text:'Costo (€)' }}
            }
        }
    });
}

calcola();

</script>

</body>
</html>
